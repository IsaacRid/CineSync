spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cinesync
    username: cinesync
    password: cinesync
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080