
services:
  postgres:
    image: postgres:16
    container_name: cinesync-postgres
    environment:
      POSTGRES_DB: cinesync
      POSTGRES_USER: cinesync
      POSTGRES_PASSWORD: cinesync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: cinesync-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: